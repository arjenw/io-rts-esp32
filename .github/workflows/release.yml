name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-heltec:
    name: Build (Heltec ESP32)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py -DIDF_TARGET=esp32 -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.heltec" -DAPP_VERSION="${{ github.ref_name }}" build

      - name: Prepare artifacts
        run: |
          . $IDF_PATH/export.sh
          TAG="${{ github.ref_name }}"
          cp build/io-rts-esp32.bin "heltec-${TAG}-firmware.bin"
          cp build/web.bin          "heltec-${TAG}-web.bin"
          python -m esptool --chip esp32 merge-bin \
            --flash-size 4MB \
            --output "heltec-${TAG}-full.bin" \
            --target-offset 0x0 \
            0x1000   build/bootloader/bootloader.bin \
            0xf000   build/partition_table/partition-table.bin \
            0x375000 build/ota_data_initial.bin \
            0x10000  build/io-rts-esp32.bin \
            0x390000 build/web.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: heltec-artifacts
          path: |
            heltec-${{ github.ref_name }}-full.bin
            heltec-${{ github.ref_name }}-firmware.bin
            heltec-${{ github.ref_name }}-web.bin

  build-lilygo:
    name: Build (LilyGo T3S3 ESP32-S3)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py -B build_t3s3 -DIDF_TARGET=esp32s3 -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.lilygo_t3s3" -DAPP_VERSION="${{ github.ref_name }}" build

      - name: Prepare artifacts
        run: |
          . $IDF_PATH/export.sh
          TAG="${{ github.ref_name }}"
          cp build_t3s3/io-rts-esp32.bin "lilygo-t3s3-${TAG}-firmware.bin"
          cp build_t3s3/web.bin          "lilygo-t3s3-${TAG}-web.bin"
          python -m esptool --chip esp32s3 merge-bin \
            --flash-size 4MB \
            --output "lilygo-t3s3-${TAG}-full.bin" \
            --target-offset 0x0 \
            0x0      build_t3s3/bootloader/bootloader.bin \
            0xf000   build_t3s3/partition_table/partition-table.bin \
            0x375000 build_t3s3/ota_data_initial.bin \
            0x10000  build_t3s3/io-rts-esp32.bin \
            0x390000 build_t3s3/web.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lilygo-artifacts
          path: |
            lilygo-t3s3-${{ github.ref_name }}-full.bin
            lilygo-t3s3-${{ github.ref_name }}-firmware.bin
            lilygo-t3s3-${{ github.ref_name }}-web.bin

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-heltec, build-lilygo]
    permissions:
      contents: write
    steps:
      - name: Download Heltec artifacts
        uses: actions/download-artifact@v4
        with:
          name: heltec-artifacts

      - name: Download LilyGo artifacts
        uses: actions/download-artifact@v4
        with:
          name: lilygo-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            heltec-${{ github.ref_name }}-full.bin
            heltec-${{ github.ref_name }}-firmware.bin
            heltec-${{ github.ref_name }}-web.bin
            lilygo-t3s3-${{ github.ref_name }}-full.bin
            lilygo-t3s3-${{ github.ref_name }}-firmware.bin
            lilygo-t3s3-${{ github.ref_name }}-web.bin
